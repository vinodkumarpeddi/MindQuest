apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mindquest

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: mindquest-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name: mindquest-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name: mindquest-ai
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
