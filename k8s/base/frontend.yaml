apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-frontend
  namespace: mindquest
  labels:
    app: mindquest
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindquest
      component: frontend
  template:
    metadata:
      labels:
        app: mindquest
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/vinodkumarpeddi/mindquest-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-frontend
  namespace: mindquest
  labels:
    app: mindquest
    component: frontend
spec:
  selector:
    app: mindquest
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
