apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-frontend
  namespace: mindquest
  labels:
    app: mindquest
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mindquest
      component: frontend
  template:
    metadata:
      labels:
        app: mindquest
        component: frontend
    spec:
      containers:
        - name: frontend
          image: mindquest-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-frontend
  namespace: mindquest
spec:
  selector:
    app: mindquest
    component: frontend
  ports:
    - port: 80
      targetPort: 80
