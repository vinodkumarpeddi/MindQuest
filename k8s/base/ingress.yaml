apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindquest-ingress
  namespace: mindquest
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: "mindquest-backend"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: mindquest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindquest-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mindquest-backend
                port:
                  number: 3001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: mindquest-backend
                port:
                  number: 3001
