apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindquest-ingress
  namespace: mindquest
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: "mindquest-backend"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
    # Frontend: mindquest.192.168.49.2.sslip.io
    - host: mindquest.192.168.49.2.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindquest-frontend
                port:
                  number: 80

    # Backend API: api.192.168.49.2.sslip.io
    - host: api.192.168.49.2.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindquest-backend
                port:
                  number: 3001

    # AI Service: ai.192.168.49.2.sslip.io
    - host: ai.192.168.49.2.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindquest-ai
                port:
                  number: 5001
