# NodePort services for access without a domain
# Access via http://<CLUSTER_IP>:30080 (frontend)
# Backend and AI are internal-only (accessed by frontend via cluster DNS)
apiVersion: v1
kind: Service
metadata:
  name: mindquest-frontend-nodeport
  namespace: mindquest
spec:
  type: NodePort
  selector:
    app: mindquest
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-backend-nodeport
  namespace: mindquest
spec:
  type: NodePort
  selector:
    app: mindquest
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30301
