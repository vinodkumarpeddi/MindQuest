apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-ai
  namespace: mindquest
  labels:
    app: mindquest
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mindquest
      component: ai
  template:
    metadata:
      labels:
        app: mindquest
        component: ai
    spec:
      containers:
        - name: ai
          image: ghcr.io/vinodkumarpeddi/mindquest-ai:latest
          ports:
            - containerPort: 5001
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mindquest-secrets
                  key: GEMINI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-ai
  namespace: mindquest
  labels:
    app: mindquest
    component: ai
spec:
  selector:
    app: mindquest
    component: ai
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  type: ClusterIP
