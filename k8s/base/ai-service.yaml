apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-ai
  namespace: mindquest
  labels:
    app: mindquest
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mindquest
      component: ai
  template:
    metadata:
      labels:
        app: mindquest
        component: ai
    spec:
      containers:
        - name: ai
          image: mindquest-ai:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mindquest-secrets
                  key: GEMINI_API_KEY
            - name: PORT
              value: "5001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-ai
  namespace: mindquest
spec:
  selector:
    app: mindquest
    component: ai
  ports:
    - port: 5001
      targetPort: 5001
