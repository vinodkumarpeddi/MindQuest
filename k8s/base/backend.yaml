apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-backend
  namespace: mindquest
  labels:
    app: mindquest
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindquest
      component: backend
  template:
    metadata:
      labels:
        app: mindquest
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/vinodkumarpeddi/mindquest-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: mindquest-config
            - secretRef:
                name: mindquest-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-backend
  namespace: mindquest
  labels:
    app: mindquest
    component: backend
spec:
  selector:
    app: mindquest
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
