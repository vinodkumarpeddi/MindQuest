apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindquest-backend
  namespace: mindquest
  labels:
    app: mindquest
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mindquest
      component: backend
  template:
    metadata:
      labels:
        app: mindquest
        component: backend
    spec:
      containers:
        - name: backend
          image: mindquest-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: mindquest-config
            - secretRef:
                name: mindquest-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mindquest-backend
  namespace: mindquest
spec:
  selector:
    app: mindquest
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
