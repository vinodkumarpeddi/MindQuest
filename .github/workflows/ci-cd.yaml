name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mindquest

jobs:
  # ──────────────────────────────────────
  # Job 1: Build & Push Docker Images
  # ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: Dockerfile.frontend
            context: .
          - service: backend
            dockerfile: Dockerfile.backend
            context: .
          - service: ai
            dockerfile: Dockerfile.ai
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://mindquest.example.com' }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL || 'https://mindquest.example.com' }}
            VITE_AI_SERVICE_URL=${{ vars.VITE_AI_SERVICE_URL || 'https://mindquest.example.com' }}

  # ──────────────────────────────────────
  # Job 2: Update K8s manifests (GitOps)
  # ──────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in K8s manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          # Update frontend image tag
          sed -i "s|image: ghcr.io/OWNER/mindquest-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${SHORT_SHA}|g" \
            k8s/base/frontend.yaml

          # Update backend image tag
          sed -i "s|image: ghcr.io/OWNER/mindquest-backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${SHORT_SHA}|g" \
            k8s/base/backend.yaml

          # Update AI service image tag
          sed -i "s|image: ghcr.io/OWNER/mindquest-ai:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai:${SHORT_SHA}|g" \
            k8s/base/ai-service.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
