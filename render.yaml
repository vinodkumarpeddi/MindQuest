services:
  # ── Frontend (Static Site) ──
  - type: web
    name: mindquest-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://mindquest-backend.onrender.com
      - key: VITE_SOCKET_URL
        value: https://mindquest-backend.onrender.com
      - key: VITE_AI_SERVICE_URL
        value: https://mindquest-ai.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend (Node.js) ──
  - type: web
    name: mindquest-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: AI_SERVICE_URL
        value: https://mindquest-ai.onrender.com
      - key: FRONTEND_URL
        value: https://mindquest-frontend.onrender.com

  # ── AI Service (Python) ──
  - type: web
    name: mindquest-ai
    runtime: python
    buildCommand: cd ai_service && pip install -r requirements.txt
    startCommand: cd ai_service && python app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
