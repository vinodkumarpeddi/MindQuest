services:
  # ── Backend (Node.js) ──
  - type: web
    name: mindquest-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: AI_SERVICE_URL
        value: https://mindquest-ai.onrender.com
      - key: FRONTEND_URL
        value: https://mindquest-app.vercel.app

  # ── AI Service (Python) ──
  - type: web
    name: mindquest-ai
    runtime: python
    buildCommand: cd ai_service && pip install -r requirements.txt
    startCommand: cd ai_service && python app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
